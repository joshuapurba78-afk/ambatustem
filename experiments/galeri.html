<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Foto - The Peepzz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #061108;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            padding: 40px;
            text-align: center;
        }
        .btn-back {
            display: inline-block;
            color: #76ff03;
            text-decoration: none;
            margin-bottom: 30px;
            font-weight: bold;
        }
        h1 {
            margin-bottom: 40px;
            font-size: 32px;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .gallery-item {
            width: 100%;
            height: 250px;
            overflow: hidden;
            border-radius: 12px;
            border: 3px solid #204d27;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .gallery-item img:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <a href="index2.html" class="btn-back">&larr; Kembali ke Home</a>
    <h1>Kenang-kenangan. Sapa tau ada yang pindah Kefa</h1>

    <div class="gallery-grid">
        <div class="gallery-item"><img src="nama_folder_kamu/foto1.jpg" alt="Foto 1"></div>
        <div class="gallery-item"><img src="nama_folder_kamu/foto2.jpg" alt="Foto 2"></div>
        <div class="gallery-item"><img src="nama_folder_kamu/foto3.jpg" alt="Foto 3"></div>
        <div class="gallery-item"><img src="nama_folder_kamu/foto4.jpg" alt="Foto 4"></div>
        <div class="gallery-item"><img src="nama_folder_kamu/foto5.jpg" alt="Foto 5"></div>
        <div class="gallery-item"><img src="nama_folder_kamu/foto6.jpg" alt="Foto 6"></div>
    </div>

</body>
</html>
